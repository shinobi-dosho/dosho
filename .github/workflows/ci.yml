name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out dosho
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -q

      - name: Lint
        run: uv run ruff check .

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out dosho
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build docs
        run: uv run sphinx-build -b html docs docs/_build/html -W --keep-going

      # The build regenerates docs/reference/cabs.rst in place from the live
      # registry (docs/_ext/cab_catalog.py). If that changes the committed
      # copy, a cab change landed without regenerating the catalog.
      - name: Check cab catalog is up to date
        run: |
          if ! git diff --exit-code docs/reference/cabs.rst; then
            echo "::error file=docs/reference/cabs.rst::Cab catalog is stale. Regenerate with 'uv run --group docs sphinx-build -b html docs docs/_build/html' and commit docs/reference/cabs.rst."
            exit 1
          fi
