name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: dosho
    steps:
      - name: Check out dosho
        uses: actions/checkout@v7
        with:
          path: dosho

      # PyPI's stimela-ninja release lags its git main (see CONTRIBUTING.md
      # "Development setup") -- build against main via --with-editable
      # rather than the plain `uv sync` resolution.
      - name: Check out stimela-ninja
        uses: actions/checkout@v7
        with:
          repository: SpheMakh/stimela-ninja
          path: stimela-ninja

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run --with-editable ../stimela-ninja -- pytest -q

      - name: Lint
        run: uv run ruff check .

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dosho
    steps:
      - name: Check out dosho
        uses: actions/checkout@v7
        with:
          path: dosho

      - name: Check out stimela-ninja
        uses: actions/checkout@v7
        with:
          repository: SpheMakh/stimela-ninja
          path: stimela-ninja

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build docs
        run: >
          uv run --with-editable ../stimela-ninja --
          sphinx-build -b html docs docs/_build/html -W --keep-going
