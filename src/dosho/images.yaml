# dosho image manifest -- the single source of truth linking each cab's
# container image to a registry reference (and, once dosho builds its own, to
# a build recipe). Loaded by images.py, which exposes each KEY as a module
# constant (images.<KEY>) that cab modules import unchanged.
#
# Schema:
#   metadata:
#     registry: <host>/<namespace>   # where dosho-built images publish
#     bundle_version: dX.Y.Z         # tag suffix for dosho-built images
#   images:
#     <KEY>:
#       source: "<upstream repo URL>" # provenance (documentary)
#       ref: "<full image ref>"       # use this image verbatim (external)
#       #  -- OR --
#       build:                        # dosho builds this image
#         version: "<tool version>"   # -> {registry}/{name}:{version}-{bundle_version}
#         base: <KEY>                  # optional: build FROM another dosho image
#         package: "<pip spec>"        # (pip tools) installed into the image
#         dockerfile: <path under cargo/>
#         cmd: "<sanity command>"
#         # ...arbitrary extra vars consumed by the tool's Dockerfile template
#       name: <repo>                   # optional; defaults to <KEY>.lower()
#
# Per-deployment overrides (highest precedence last):
#   manifest  <  the YAML file named by $DOSHO_IMAGES  <  per-tool $DOSHO_IMAGE_<KEY>

metadata:
  registry: ghcr.io/shinobi-dosho
  bundle_version: d0.1.0

images:
  # Shared base image: KERN suite base + python + casacore + common astro stack.
  # Pip tools build `FROM` it (base: BASE_ASTRO) so the heavy layer is built once.
  BASE_ASTRO:
    name: base-astro
    source: "https://kernsuite.info"
    build:
      version: "kern10"
      kern_version: "10"
      cmd: "python3 --version"
      dockerfile: base-astro/Dockerfile

  # ---- dosho-built ----
  SIMMS:
    name: simms
    source: "https://github.com/wits-cfa/simms"
    build:
      version: "3.0b3"
      base: BASE_ASTRO
      package: "simms==3.0b3"
      cmd: "simms --help"
      dockerfile: pip/Dockerfile

  MSUTILS:
    name: msutils
    source: "https://github.com/sphemakh/msutils"
    build:
      version: "2.0.0b1"
      base: BASE_ASTRO
      # [all] pulls the flagstats (dask-ms, matplotlib) + plots (scipy) extras
      # so `msutils flagstats` works out of the box.
      package: "msutils[all]==2.0.0b1"
      cmd: "msutils --help"
      dockerfile: pip/Dockerfile

  # ---- still referencing existing published images (onboarded incrementally) ----
  WSCLEAN:
    source: "https://gitlab.com/aroffringa/wsclean"
    name: wsclean
    build:
      version: "3.6"
      kern_version: "10"
      package_version: "3.6"
      cmd: "wsclean --version"
      dockerfile: wsclean/Dockerfile
  CUBICAL:
    source: "https://github.com/ratt-ru/CubiCal"
    ref: "quay.io/stimela2/cubical:1.6.4-cc0.2.1"
  QUARTICAL:
    source: "https://github.com/ratt-ru/QuartiCal"
    name: quartical
    build:
      version: "0.2.7"
      base: BASE_ASTRO
      package: "quartical==0.2.7"
      pip_install_flags: "--no-build-isolation"
      # goquartical is config-file-driven and rejects --help; import-check instead.
      cmd: "python3 -c 'import quartical'"
      dockerfile: pip/Dockerfile
  AOFLAGGER:
    source: "https://gitlab.com/aroffringa/aoflagger"
    name: aoflagger
    build:
      version: "kern10"
      kern_version: "10"
      cmd: "aoflagger --version"
      dockerfile: aoflagger/Dockerfile
  TRICOLOUR:
    source: "https://github.com/ratt-ru/tricolour"
    name: tricolour
    build:
      version: "0.2.1"
      base: BASE_ASTRO
      package: "tricolour==0.2.1"
      cmd: "tricolour --help"
      dockerfile: pip/Dockerfile
  CRYSTALBALL:
    source: "https://github.com/caracal-pipeline/crystalball"
    name: crystalball
    build:
      version: "0.4.3"
      base: BASE_ASTRO
      package: "crystalball==0.4.3"
      extra_deps: "-U matplotlib"
      cmd: "crystalball --help"
      dockerfile: pip/Dockerfile
  OWLCAT:
    source: "https://github.com/ratt-ru/owlcat"
    name: owlcat
    build:
      version: "1.8.1"
      base: BASE_ASTRO
      package: "owlcat==1.8.1"
      cmd: "plot-elevation-tracks.py --help"
      dockerfile: pip/Dockerfile
  SHADEMS:
    source: "https://github.com/ratt-ru/shadeMS"
    name: shadems
    build:
      version: "0.5.4"
      base: BASE_ASTRO
      package: "shadems==0.5.4"
      extra_deps: 'pyarrow "dask[dataframe]<2025.1"'
      cmd: "shadems --help"
      dockerfile: pip/Dockerfile
  RAGAVI:
    source: "https://github.com/ratt-ru/ragavi"
    name: ragavi
    build:
      version: "0.5.2"
      # ragavi 0.5.2 (2020) targets Python 3.6 + an era bokeh/numpy and breaks on
      # the modern shared BASE_ASTRO (Python 3.12 / numpy 2.x / bokeh 3.x removed
      # Plot.plot_width and np.bool8). Built via a dedicated Dockerfile on
      # stimela-classic's own ragavi base (stimela/base:1.2.5) -- no shared dosho
      # base; see cargo/ragavi/Dockerfile.
      dockerfile: ragavi/Dockerfile
  SOFIA2:
    source: "https://gitlab.com/SoFiA-Admin/SoFiA-2"
    name: sofia2
    build:
      version: "2.7.0"
      kern_version: "10"
      package_version: "2.7.0"
      # bare `sofia` wants a parameter file (exit 7); -h is the clean self-check.
      cmd: "sofia -h"
      dockerfile: sofia2/Dockerfile
  # CASA6 (casatasks/casaplotms) built fresh -- lean KERN base + casa wheels +
  # baked measures data + extracted casaplotms AppImage. The heavy, isolated one.
  CASA6:
    source: "https://casadocs.readthedocs.io"
    name: casa6
    build:
      version: "6.7"
      kern_version: "10"
      wheel_version: "6.7.0.31"
      cmd: "python3 -c 'import casatasks, casaplotms'"
      dockerfile: casa6/Dockerfile
  # DEPRECATED: the pre-3.0 simms command, unused by any worker -- slated for removal.
  SIMMS_CLASSIC:
    source: "https://github.com/wits-cfa/simms"
    ref: "quay.io/stimela2/simms-classic:cc0.2.1"
  MOSAIC_QUEEN:
    source: "https://github.com/caracal-pipeline/MosaicQueen"
    name: mosaic-queen
    build:
      version: "2.0.2"
      base: BASE_ASTRO
      package: "mosaic-queen==2.0.2"
      pre_install: "RUN docker-apt-install montage"
      cmd: "mosaic-queen --help"
      dockerfile: pip/Dockerfile
  BREIZORRO:
    source: "https://github.com/ratt-ru/breizorro"
    name: breizorro
    build:
      version: "0.2.0"
      base: BASE_ASTRO
      package: "breizorro==0.2.0"
      cmd: "breizorro --help"
      dockerfile: pip/Dockerfile
  AIMFAST:
    source: "https://github.com/Athanaseus/aimfast"
    name: aimfast
    build:
      version: "1.3.4"
      base: BASE_ASTRO
      package: "aimfast==1.3.4"
      # aimfast 1.3.4 hard-pins astLib==0.10.0, which fails to import on
      # Python 3.12 (PyWCSTools.wcs does `import imp`, removed in 3.12).
      # A single combined `pip install aimfast astLib>=0.13` is
      # unresolvable (aimfast's exact pin conflicts with the upgrade), so
      # this has to be a second, separate pip invocation that overrides
      # the pin after the fact.
      post_install: "RUN pip install --break-system-packages -U astLib>=0.13.2"
      cmd: "aimfast --help"
      dockerfile: pip/Dockerfile
  EIDOS:
    source: "https://github.com/ratt-ru/eidos"
    name: eidos
    build:
      version: "1.1.2"
      base: BASE_ASTRO
      package: "eidos==1.1.2"
      cmd: "eidos --help"
      dockerfile: pip/Dockerfile
  SMOPS:
    source: "https://github.com/ratt-ru/smops"
    name: smops
    build:
      version: "0.1.7"
      base: BASE_ASTRO
      package: "smops==0.1.7"
      # smops 0.1.7 hard-pins stimela==2.0rc4 (a yanked pre-release), whose
      # bundled scabha fails to import on Python 3.12 (a dataclass with a
      # mutable default, fixed upstream). Same "second pip invocation"
      # workaround as AIMFAST -- see that entry's comment.
      post_install: "RUN pip install --break-system-packages -U stimela"
      cmd: "smops --help"
      dockerfile: pip/Dockerfile
  AEGEAN:
    source: "https://github.com/PaulHancock/Aegean"
    name: aegean
    build:
      version: "2.3.5"
      base: BASE_ASTRO
      package: "AegeanTools==2.3.5"
      cmd: "aegean --help"
      dockerfile: pip/Dockerfile
  RM_TOOLS:
    source: "https://github.com/CIRADA-Tools/RM-Tools"
    name: rm-tools
    build:
      version: "1.4.11"
      base: BASE_ASTRO
      package: "RM-Tools==1.4.11"
      cmd: "rmsynth1d --help"
      dockerfile: pip/Dockerfile
  RFINDER:
    source: "https://github.com/Fil8/RFInder"
    name: rfinder
    build:
      version: "1.1.0"
      base: BASE_ASTRO
      package: "rfinder==1.1.0"
      # rfinder imports pkg_resources at runtime; a bare `pip install` on top
      # of BASE_ASTRO can otherwise pull the newest setuptools, which dropped
      # pkg_resources.
      extra_deps: "'setuptools<81'"
      cmd: "rfinder --help"
      dockerfile: pip/Dockerfile
  PYDDI:
    source: "https://github.com/IanHeywood/pyddi"
    name: pyddi
    build:
      version: "0.0.4"
      base: BASE_ASTRO
      package: "pyddi==0.0.4"
      extra_deps: "'setuptools<81'"  # see RFINDER's comment
      cmd: "pyddi --help"
      dockerfile: pip/Dockerfile
  SPIMPLE:
    source: "https://github.com/ratt-ru/spimple"
    name: spimple
    build:
      version: "0.0.5"
      base: BASE_ASTRO
      package: "spimple==0.0.5"
      cmd: "spimple-binterp --help"
      dockerfile: pip/Dockerfile
  TIGGER_LSM:
    source: "https://github.com/ska-sa/tigger-lsm"
    name: tigger-lsm
    build:
      version: "1.8.0"
      base: BASE_ASTRO
      package: "astro-tigger-lsm==1.8.0"
      cmd: "tigger-convert --help"
      dockerfile: pip/Dockerfile
  BDSF:
    source: "https://github.com/lofar-astron/PyBDSF"
    name: bdsf
    build:
      version: "1.14.1"
      base: BASE_ASTRO
      package: "bdsf==1.14.1"
      cmd: "python3 -c 'import bdsf'"
      dockerfile: pip/Dockerfile
