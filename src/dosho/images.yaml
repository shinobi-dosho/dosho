# dosho image manifest -- the single source of truth linking each cab's
# container image to a registry reference (and, once dosho builds its own,
# to a build recipe). Loaded by images.py, which exposes each KEY as a
# module constant (images.<KEY>) that cab modules import unchanged.
#
# Schema:
#   metadata:
#     registry: <host>/dosho     # where dosho-built images publish
#     bundle_version: dX.Y.Z     # tag suffix for dosho-built images
#   images:
#     <KEY>:                     # the constant cabs read as images.<KEY>
#       ref: "<full image ref>"  # use this image verbatim (bootstrap / external)
#       #  -- OR --
#       build:                   # dosho builds this image (see the build subsystem)
#         version: "<tool version>"
#         # dockerfile / base / package ... (added with the build CLI)
#       name: <repo>             # optional; defaults to <KEY>.lower()
#
# A `ref:` entry points at an existing published image (a placeholder until
# dosho builds its own); a `build:` entry resolves to
# `{registry}/{name}:{version}-{bundle_version}`. Cabs are unaffected either
# way -- they only see the resolved images.<KEY> string.
#
# Per-deployment overrides (highest precedence last):
#   manifest  <  the YAML file named by $DOSHO_IMAGES  <  per-tool $DOSHO_IMAGE_<KEY>

metadata:
  # namespace is `dosho`; host defaults to ghcr.io. Only used to compose refs
  # for `build:` entries -- `ref:` entries are used verbatim.
  registry: ghcr.io/dosho
  bundle_version: d0.1.0

images:
  # Tags cross-checked against cult-cargo's bundle-manifest.md -- these `ref:`
  # entries reuse existing published images as placeholders until the
  # corresponding dosho-built image lands (onboarded incrementally).
  WSCLEAN:
    ref: "quay.io/stimela2/wsclean:3.6-haswell-cc0.2.1"
  CUBICAL:
    ref: "quay.io/stimela2/cubical:1.6.4-cc0.2.1"
  QUARTICAL:
    ref: "quay.io/stimela2/quartical:0.2.5-cc0.2.1"
  AOFLAGGER:
    ref: "quay.io/stimela2/aoflagger:cc0.2.1"
  TRICOLOUR:
    ref: "quay.io/stimela2/tricolour:cc0.2.1"
  CRYSTALBALL:
    ref: "quay.io/stimela2/crystalball:cc0.2.1"
  OWLCAT:
    ref: "quay.io/stimela2/owlcat:cc0.2.1"
  SHADEMS:
    ref: "quay.io/stimela2/shadems:cc0.1.3"
  RAGAVI:
    ref: "quay.io/stimela2/ragavi:cc0.2.1"
  SOFIA2:
    ref: "quay.io/stimela2/sofia2:cc0.2.1"
  # CASA6 pins the real tested tag caracal2 relies on (casatasks/casaplotms
  # pysteps both use this image).
  CASA6:
    ref: "quay.io/stimela2/casa6:6.7-cc0.2.1"
  SIMMS:
    ref: "quay.io/stimela2/simms:cc0.2.1"
  # pre-3.0 simms -- a genuinely different tool from simms 3.0's skysim/telsim.
  SIMMS_CLASSIC:
    ref: "quay.io/stimela2/simms-classic:cc0.2.1"
  MOSAIC_QUEEN:
    ref: "quay.io/stimela2/mosaic-queen:cc0.2.1"
