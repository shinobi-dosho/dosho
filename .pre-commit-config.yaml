# Install once with `uv run pre-commit install` (or `pipx run pre-commit install`).
repos:
  - repo: local
    hooks:
      # docs/reference/cabs.rst is generated from the live registry; CI fails
      # a PR whose committed copy is stale. Catch that at commit time instead:
      # this regenerates the catalog in place and fails the commit if it
      # changed, so you just `git add docs/reference/cabs.rst` and retry.
      - id: cab-catalog
        name: cab catalog is fresh (docs/reference/cabs.rst)
        entry: uv run python docs/_ext/cab_catalog.py
        language: system
        pass_filenames: false
        files: ^(src/dosho/|docs/_ext/cab_catalog\.py|uv\.lock)
      # ruff lint + format. Local `uv run` hooks (not the remote
      # astral-sh/ruff-pre-commit repo) so the same pinned `ruff` dev
      # dependency runs here and on the command line -- no separate `rev:`
      # to drift. `--force-exclude` honours ruff's own excludes when
      # pre-commit passes explicit filenames.
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
